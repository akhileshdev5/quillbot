apiVersion: apps/v1
kind: Deployment
metadata:
  name: quillbot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quillbot
  template:
    metadata:
      labels:
        app: quillbot
    spec:
      containers:
      - name: quillbot
        image: quillbotimage:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
